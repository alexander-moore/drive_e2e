# ResNet-18 front-camera planner (trainable backbone)
#
# Best checkpoint: resnet18_trainable_frontcam-epoch=017-val/avg_l2=1.8000.ckpt
# Trained with: python train.py --model resnet --resnet_variant resnet18 --trainable_backbone

model:
  type: resnet
  token_dim: 256
  nhead: 4
  enc_layers: 3
  dec_layers: 3
  multiscale: true
  backbone: resnet18
  frozen_backbone: false

ckpt_path: /home/farm/Documents/Projects/drive_e2e/checkpoints/resnet18_trainable_frontcam-epoch=017-val/avg_l2=1.8000.ckpt

device: cuda

# Inference optimizations (both optional — omit to keep default pytorch/float32 behavior)
# inference_mode: compile      # torch.compile(); best CUDA option
# inference_mode: torchscript  # alternative to compile
# quantization: fp16           # recommended for CUDA — half precision on ResNet + transformer
# quantization: dynamic        # INT8 Linear quant; requires device: cpu

# Trajectory controller gains
max_speed:        4.0
steer_lookahead:  1.0
speed_lookahead:  2.0
k_steer:          1.0
k_throttle:       0.5
k_brake:          1.5
